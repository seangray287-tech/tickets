<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tickets — Redesign Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-primary:#08080c;
    --bg-surface:#121218;
    --bg-surface-raised:#17171f;
    --bg-surface-hover:#1d1d27;
    --border-subtle:rgba(255,255,255,.07);
    --border-default:rgba(255,255,255,.12);
    --accent-indigo:#6571ff;
    --accent-violet:#a855f7;
    --accent-glow:rgba(101,113,255,.35);
    --text-primary:#f3f3f6;
    --text-secondary:#9a9aa6;
    --text-tertiary:#5c5c68;
    --success:#34d399;
    --warning:#fbbf24;
    --font-display:'Sora',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--bg-primary);
    color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:.28;pointer-events:none;z-index:0;}
  .glow-1{width:520px;height:520px;background:var(--accent-indigo);top:-220px;left:-120px;}
  .glow-2{width:420px;height:420px;background:var(--accent-violet);top:-160px;right:-100px;}

  .app-header{position:relative;z-index:1;padding:34px 40px 20px;}
  .app-header h1{
    font-family:var(--font-display);
    font-size:28px;
    font-weight:800;
    margin:0 0 6px;
    letter-spacing:-.02em;
  }
  .app-header p{margin:0;color:var(--text-secondary);font-size:14px;}

  .app-body{
    position:relative;z-index:1;
    flex:1;
    display:flex;
    gap:20px;
    padding:0 40px 40px;
    min-height:0;
  }

  /* SIDEBAR */
  .sidebar{
    width:330px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    background:var(--bg-surface);
    border:1px solid var(--border-subtle);
    border-radius:20px;
    padding:18px;
    min-height:0;
  }
  .sidebar-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:2px 4px 16px;
  }
  .sidebar-label{
    font-family:var(--font-mono);
    font-size:11px;letter-spacing:.12em;
    color:var(--text-tertiary);
    text-transform:uppercase;
  }
  .new-ticket-btn{
    width:26px;height:26px;border-radius:8px;
    border:1px solid var(--border-default);
    background:var(--bg-surface-raised);
    color:var(--text-secondary);
    font-size:16px;line-height:1;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .new-ticket-btn:hover{color:var(--text-primary);border-color:var(--accent-indigo);background:var(--bg-surface-hover);}

  .ticket-list{
    display:flex;flex-direction:column;gap:20px;
    overflow-y:auto;
    padding:6px 6px 6px 12px;
    flex:1;
    min-height:0;
  }
  .ticket-list::-webkit-scrollbar{width:6px;}
  .ticket-list::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:10px;}

  .ticket-stub{
    position:relative;
    background:var(--bg-surface-raised);
    border:1px solid var(--border-subtle);
    border-radius:14px;
    padding:13px 14px 13px 20px;
    cursor:pointer;
    transition:.15s;
  }
  .ticket-stub:hover{border-color:var(--border-default);background:var(--bg-surface-hover);}
  .ticket-stub.active{border-color:var(--accent-indigo);box-shadow:0 0 0 1px var(--accent-indigo), 0 8px 20px -6px var(--accent-glow);}
  .ticket-stub::before,.ticket-stub::after{
    content:'';position:absolute;left:-9px;width:16px;height:16px;
    background:var(--bg-surface);border-radius:50%;
    box-shadow:inset 0 0 0 1px var(--border-subtle);
  }
  .ticket-stub::before{top:-9px;}
  .ticket-stub::after{bottom:-9px;}

  .stub-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .stub-id{font-family:var(--font-mono);font-size:10.5px;color:var(--text-tertiary);letter-spacing:.03em;}
  .unread-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-violet);flex-shrink:0;box-shadow:0 0 0 3px rgba(168,85,247,.18);}
  .stub-subject{font-size:13.5px;font-weight:600;margin:0 0 4px;color:var(--text-primary);}
  .stub-preview{font-size:12.5px;color:var(--text-secondary);margin:0 0 10px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .stub-bottom{display:flex;align-items:center;justify-content:space-between;}
  .stub-time{font-family:var(--font-mono);font-size:10.5px;color:var(--text-tertiary);}

  .status-pill{
    display:inline-flex;align-items:center;gap:5px;
    padding:2px 8px 2px 6px;border-radius:999px;
    font-family:var(--font-mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;
  }
  .status-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
  .status-pill.open{color:var(--success);background:rgba(52,211,153,.12);}
  .status-pill.pending{color:var(--warning);background:rgba(251,191,36,.12);}
  .status-pill.closed{color:var(--text-secondary);background:rgba(154,154,166,.12);}

  .sidebar-empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--text-tertiary);text-align:center;padding:20px;
  }
  .sidebar-empty svg{opacity:.5;}
  .sidebar-empty p{margin:0;font-size:13px;color:var(--text-secondary);}
  .link-btn{
    background:none;border:none;color:var(--accent-violet);
    font-family:var(--font-body);font-size:13px;font-weight:600;
    cursor:pointer;padding:0;
  }
  .link-btn:hover{text-decoration:underline;}

  .demo-toggle{
    margin-top:14px;width:100%;padding:9px;border-radius:10px;
    border:1px dashed var(--border-default);
    background:transparent;color:var(--text-tertiary);
    font-family:var(--font-body);font-size:11.5px;cursor:pointer;
    transition:.15s;
  }
  .demo-toggle:hover{color:var(--text-secondary);border-color:var(--text-tertiary);}

  /* MAIN PANEL */
  .main-panel{
    flex:1;min-width:0;
    background:var(--bg-surface);
    border:1px solid var(--border-subtle);
    border-radius:20px;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .panel-header{
    display:flex;align-items:center;gap:12px;
    padding:18px 22px;border-bottom:1px solid var(--border-subtle);
    flex-shrink:0;
  }
  .panel-icon{
    width:34px;height:34px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent-indigo),var(--accent-violet));
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .panel-icon svg{width:17px;height:17px;}
  .panel-title{font-weight:700;font-size:14.5px;}
  .panel-sub{font-size:12px;color:var(--text-tertiary);margin-top:1px;}
  .back-btn{
    margin-left:auto;background:var(--bg-surface-raised);border:1px solid var(--border-default);
    color:var(--text-secondary);width:30px;height:30px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .back-btn:hover{color:var(--text-primary);}

  /* PICKER VIEW */
  .picker-view{padding:40px;flex:1;overflow-y:auto;}
  .picker-heading{text-align:center;font-size:15px;color:var(--text-secondary);margin:0 0 26px;}
  .category-grid{display:flex;flex-direction:column;gap:12px;max-width:640px;margin:0 auto;}
  .category-card{
    display:flex;align-items:center;gap:16px;
    padding:18px 20px;border-radius:16px;
    background:var(--bg-surface-raised);border:1px solid var(--border-subtle);
    cursor:pointer;transition:.18s;text-align:left;
  }
  .category-card:hover{
    border-color:var(--accent-indigo);
    background:var(--bg-surface-hover);
    transform:translateY(-1px);
    box-shadow:0 12px 24px -12px var(--accent-glow);
  }
  .category-icon{
    width:44px;height:44px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(101,113,255,.12);color:var(--accent-indigo);
  }
  .category-card:nth-child(2) .category-icon{background:rgba(168,85,247,.12);color:var(--accent-violet);}
  .category-card:nth-child(3) .category-icon{background:rgba(251,191,36,.12);color:var(--warning);}
  .category-icon svg{width:20px;height:20px;}
  .category-title{font-weight:700;font-size:14.5px;margin:0 0 2px;}
  .category-desc{font-size:12.5px;color:var(--text-secondary);margin:0;}
  .category-arrow{margin-left:auto;color:var(--text-tertiary);flex-shrink:0;}

  /* THREAD VIEW */
  .thread-view{flex:1;display:flex;flex-direction:column;min-height:0;}
  .thread-messages{flex:1;overflow-y:auto;padding:24px 26px;display:flex;flex-direction:column;gap:16px;}
  .msg-row{display:flex;gap:10px;max-width:78%;}
  .msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg-avatar{
    width:28px;height:28px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:11px;font-weight:600;
    background:var(--bg-surface-raised);border:1px solid var(--border-default);color:var(--text-secondary);
  }
  .msg-row.user .msg-avatar{background:linear-gradient(135deg,var(--accent-indigo),var(--accent-violet));color:#fff;border:none;}
  .msg-bubble{
    background:var(--bg-surface-raised);border:1px solid var(--border-subtle);
    padding:11px 14px;border-radius:14px 14px 14px 4px;
    font-size:13.5px;line-height:1.5;
  }
  .msg-row.user .msg-bubble{
    background:linear-gradient(135deg,var(--accent-indigo),#5561e8);
    border:none;color:#fff;border-radius:14px 14px 4px 14px;
  }
  .msg-time{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:5px;}
  .msg-row.user .msg-time{text-align:right;}
  .typing{display:flex;gap:4px;padding:4px 2px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-4px);opacity:1;}}

  .thread-input{
    display:flex;align-items:flex-end;gap:10px;
    padding:16px 20px;border-top:1px solid var(--border-subtle);flex-shrink:0;
  }
  .thread-input textarea{
    flex:1;resize:none;background:var(--bg-surface-raised);
    border:1px solid var(--border-default);border-radius:12px;
    color:var(--text-primary);font-family:var(--font-body);font-size:13.5px;
    padding:11px 13px;max-height:110px;outline:none;transition:.15s;
  }
  .thread-input textarea:focus{border-color:var(--accent-indigo);}
  .icon-btn{
    width:38px;height:38px;border-radius:11px;flex-shrink:0;
    background:var(--bg-surface-raised);border:1px solid var(--border-default);
    color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .icon-btn:hover{color:var(--text-primary);border-color:var(--text-tertiary);}
  .send-btn{background:var(--accent-indigo);border:none;color:#fff;}
  .send-btn:hover{background:#5561e8;}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;background:var(--accent-indigo);}

  /* COMPOSE VIEW */
  .compose-view{padding:36px 40px;max-width:560px;margin:0 auto;width:100%;flex:1;overflow-y:auto;}
  .field-group{margin-bottom:18px;}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:7px;}
  .field-input,.field-textarea{
    width:100%;background:var(--bg-surface-raised);border:1px solid var(--border-default);
    border-radius:11px;color:var(--text-primary);font-family:var(--font-body);font-size:13.5px;
    padding:11px 13px;outline:none;transition:.15s;
  }
  .field-input:focus,.field-textarea:focus{border-color:var(--accent-indigo);}
  .field-textarea{resize:vertical;min-height:120px;}
  .submit-btn{
    width:100%;padding:13px;border-radius:12px;border:none;
    background:linear-gradient(135deg,var(--accent-indigo),var(--accent-violet));
    color:#fff;font-family:var(--font-display);font-weight:700;font-size:13.5px;
    cursor:pointer;transition:.15s;
  }
  .submit-btn:hover{filter:brightness(1.08);}

  /* FAB */
  .fab-wrap{position:fixed;right:28px;bottom:28px;z-index:5;display:flex;align-items:center;gap:12px;}
  .fab-tooltip{
    background:var(--bg-surface-raised);border:1px solid var(--border-default);
    padding:9px 14px;border-radius:12px;font-size:12.5px;font-weight:500;
    box-shadow:0 8px 20px -8px rgba(0,0,0,.6);white-space:nowrap;
  }
  .fab{
    width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--accent-indigo),var(--accent-violet));
    color:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 0 var(--accent-glow);
    animation:pulse 2.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 var(--accent-glow);}
    70%{box-shadow:0 0 0 14px rgba(101,113,255,0);}
    100%{box-shadow:0 0 0 0 rgba(101,113,255,0);}
  }

  @media (max-width:820px){
    .app-header{padding:24px 20px 14px;}
    .app-body{flex-direction:column;padding:0 20px 24px;}
    .sidebar{width:100%;max-height:230px;}
    .fab-tooltip{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <header class="app-header">
    <h1>My Tickets</h1>
    <p>View and reply to your support, redeem, and report tickets.</p>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-label">Conversations</span>
        <button class="new-ticket-btn" id="newTicketBtn" title="New ticket">+</button>
      </div>
      <div class="ticket-list" id="ticketList"></div>
      <div class="sidebar-empty" id="sidebarEmpty" hidden>
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8l3-5h12l3 5M3 8v10a2 2 0 002 2h14a2 2 0 002-2V8M3 8h18M8 13h8"/></svg>
        <p>No tickets yet.</p>
        <button class="link-btn" id="createFirstBtn">Create your first ticket</button>
      </div>
      <button class="demo-toggle" id="demoToggle">Preview empty state</button>
    </aside>

    <main class="main-panel" id="mainPanel"></main>
  </div>

  <div class="fab-wrap">
    <div class="fab-tooltip">Need help? Tap to start a ticket</div>
    <button class="fab" id="fabBtn" title="New ticket">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-8.5 8.5 8.4 8.4 0 01-3.8-.9L3 20l1.05-3.9A8.4 8.4 0 013 12.5 8.5 8.5 0 0111.5 4a8.5 8.5 0 019.5 7.5z"/></svg>
    </button>
  </div>
</div>

<script>
const ICONS = {
  headphones:'<path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/>',
  gift:'<rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13M19 12v7a2 2 0 01-2 2H7a2 2 0 01-2-2v-7"/><path d="M12 8c-1.5 0-3-1-3-2.5A2.5 2.5 0 0111.5 3C13 3 12 6 12 8zM12 8c1.5 0 3-1 3-2.5A2.5 2.5 0 0012.5 3C11 3 12 6 12 8z"/>',
  alert:'<path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/>',
  chevron:'<path d="M9 18l6-6-6-6"/>',
  paperclip:'<path d="M21.4 11.1l-9.2 9.2a5 5 0 01-7.1-7.1l9.2-9.2a3.5 3.5 0 015 5l-9.2 9.2a2 2 0 01-2.8-2.8l8.5-8.5"/>',
  send:'<path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>',
  back:'<path d="M15 18l-6-6 6-6"/>'
};
const svg=(name,size=18)=>`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`;

const CATEGORIES = [
  {key:'support', icon:'headphones', title:'Support', desc:'Get help with your orders or account'},
  {key:'redeem', icon:'gift', title:'Redeem Product', desc:'Claim your purchased items'},
  {key:'report', icon:'alert', title:'Report Issue', desc:'Report a problem or bug'},
];

let tickets = [
  {
    id:'TCK-2291', category:'redeem', subject:'Redeem: 2mil gem acc', status:'open', unread:true,
    last:'Please send your Roblox username to continue.', time:'2m ago',
    thread:[
      {from:'user', text:'Hey, I just purchased the 2mil gem acc, how do I redeem it?', time:'10:02 AM'},
      {from:'agent', text:'Thanks for your purchase! Please send your Roblox username to continue.', time:'10:05 AM'},
    ]
  },
  {
    id:'TCK-2277', category:'support', subject:'Order #10432 not delivered', status:'pending', unread:false,
    last:"We're looking into your order now.", time:'1h ago',
    thread:[
      {from:'user', text:'My order #10432 says paid but I never got the item.', time:'9:10 AM'},
      {from:'agent', text:"Sorry about that! We're looking into your order now.", time:'9:22 AM'},
    ]
  },
  {
    id:'TCK-2210', category:'report', subject:'Bug on checkout page', status:'closed', unread:false,
    last:'Thanks, this has been fixed!', time:'2d ago',
    thread:[
      {from:'user', text:'The currency selector resets every time I refresh the cart page.', time:'Mon 4:41 PM'},
      {from:'agent', text:'Thanks for flagging — this has been fixed!', time:'Mon 6:02 PM'},
    ]
  },
];

let activeTicketId = null;
let panelView = {type:'picker'};

function timeAgo(){return 'just now';}

function renderSidebar(){
  const list = document.getElementById('ticketList');
  const empty = document.getElementById('sidebarEmpty');
  if(tickets.length === 0){
    list.style.display='none';
    empty.hidden=false;
    return;
  }
  list.style.display='flex';
  empty.hidden=true;
  list.innerHTML = tickets.map(t=>`
    <div class="ticket-stub ${t.id===activeTicketId?'active':''}" data-id="${t.id}">
      <div class="stub-top">
        <span class="stub-id">${t.id}</span>
        ${t.unread?'<span class="unread-dot"></span>':''}
      </div>
      <p class="stub-subject">${t.subject}</p>
      <p class="stub-preview">${t.last}</p>
      <div class="stub-bottom">
        <span class="status-pill ${t.status}">${t.status}</span>
        <span class="stub-time">${t.time}</span>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.ticket-stub').forEach(el=>{
    el.addEventListener('click', ()=>{
      const t = tickets.find(x=>x.id===el.dataset.id);
      t.unread=false;
      activeTicketId = t.id;
      panelView = {type:'thread', ticketId:t.id};
      renderSidebar();
      renderMain();
    });
  });
}

function renderMain(){
  const panel = document.getElementById('mainPanel');

  if(panelView.type==='picker'){
    panel.innerHTML = `
      <div class="panel-header">
        <div class="panel-icon">${svg('headphones',17)}</div>
        <div><div class="panel-title">Select a ticket</div><div class="panel-sub">or start a new conversation</div></div>
      </div>
      <div class="picker-view">
        <p class="picker-heading">How can we help you today?</p>
        <div class="category-grid">
          ${CATEGORIES.map(c=>`
            <div class="category-card" data-key="${c.key}">
              <div class="category-icon">${svg(c.icon,20)}</div>
              <div>
                <p class="category-title">${c.title}</p>
                <p class="category-desc">${c.desc}</p>
              </div>
              <div class="category-arrow">${svg('chevron',16)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    panel.querySelectorAll('.category-card').forEach(el=>{
      el.addEventListener('click', ()=>{
        panelView = {type:'compose', key:el.dataset.key};
        renderMain();
      });
    });
    return;
  }

  if(panelView.type==='compose'){
    const cat = CATEGORIES.find(c=>c.key===panelView.key);
    panel.innerHTML = `
      <div class="panel-header">
        <button class="back-btn" id="backBtn">${svg('back',15)}</button>
        <div class="panel-icon">${svg(cat.icon,17)}</div>
        <div><div class="panel-title">${cat.title}</div><div class="panel-sub">${cat.desc}</div></div>
      </div>
      <div class="compose-view">
        <div class="field-group">
          <label class="field-label">Subject</label>
          <input class="field-input" id="composeSubject" value="${cat.title} request" />
        </div>
        <div class="field-group">
          <label class="field-label">Message</label>
          <textarea class="field-textarea" id="composeMsg" placeholder="Tell us what's going on..."></textarea>
        </div>
        <button class="submit-btn" id="composeSubmit">Submit ticket</button>
      </div>
    `;
    document.getElementById('backBtn').addEventListener('click', ()=>{panelView={type:'picker'};renderMain();});
    document.getElementById('composeSubmit').addEventListener('click', ()=>{
      const subject = document.getElementById('composeSubject').value || cat.title;
      const msg = document.getElementById('composeMsg').value || 'No message provided.';
      const id = 'TCK-'+(2300+tickets.length);
      const newTicket = {
        id, category:cat.key, subject, status:'open', unread:false,
        last: msg, time:'now',
        thread:[{from:'user', text:msg, time:'Just now'}]
      };
      tickets.unshift(newTicket);
      activeTicketId = id;
      panelView = {type:'thread', ticketId:id};
      renderSidebar();
      renderMain();
    });
    return;
  }

  if(panelView.type==='thread'){
    const t = tickets.find(x=>x.id===panelView.ticketId);
    const cat = CATEGORIES.find(c=>c.key===t.category) || CATEGORIES[0];
    panel.innerHTML = `
      <div class="panel-header">
        <button class="back-btn" id="backBtn">${svg('back',15)}</button>
        <div class="panel-icon">${svg(cat.icon,17)}</div>
        <div><div class="panel-title">${t.subject}</div><div class="panel-sub">${t.id} · <span class="status-pill ${t.status}" style="margin-left:2px;">${t.status}</span></div></div>
      </div>
      <div class="thread-view">
        <div class="thread-messages" id="threadMessages">
          ${t.thread.map(m=>`
            <div class="msg-row ${m.from}">
              <div class="msg-avatar">${m.from==='user'?'YOU':'SA'}</div>
              <div>
                <div class="msg-bubble">${m.text}</div>
                <div class="msg-time">${m.time}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="thread-input">
          <button class="icon-btn" title="Attach file">${svg('paperclip',17)}</button>
          <textarea id="replyBox" rows="1" placeholder="Type your reply..."></textarea>
          <button class="icon-btn send-btn" id="sendBtn" disabled>${svg('send',16)}</button>
        </div>
      </div>
    `;
    document.getElementById('backBtn').addEventListener('click', ()=>{panelView={type:'picker'};renderMain();});
    const replyBox = document.getElementById('replyBox');
    const sendBtn = document.getElementById('sendBtn');
    const msgs = document.getElementById('threadMessages');
    replyBox.addEventListener('input', ()=>{sendBtn.disabled = replyBox.value.trim()==='';});
    function sendReply(){
      const val = replyBox.value.trim();
      if(!val) return;
      t.thread.push({from:'user', text:val, time:'Just now'});
      t.last = val; t.time='now';
      replyBox.value=''; sendBtn.disabled=true;
      renderMain();
      renderSidebar();
      setTimeout(()=>{
        const messages = document.getElementById('threadMessages');
        if(!messages) return;
        const typingEl = document.createElement('div');
        typingEl.className='msg-row agent';
        typingEl.innerHTML = `<div class="msg-avatar">SA</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        messages.appendChild(typingEl);
        messages.scrollTop = messages.scrollHeight;
        setTimeout(()=>{
          t.thread.push({from:'agent', text:"Got it — we'll follow up shortly.", time:'Just now'});
          renderMain();
          const mm = document.getElementById('threadMessages');
          if(mm) mm.scrollTop = mm.scrollHeight;
        },1300);
      },500);
    }
    sendBtn.addEventListener('click', sendReply);
    replyBox.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendReply(); }
    });
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }
}

document.getElementById('newTicketBtn').addEventListener('click', ()=>{panelView={type:'picker'};renderMain();});
document.getElementById('fabBtn').addEventListener('click', ()=>{panelView={type:'picker'};renderMain();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('createFirstBtn').addEventListener('click', ()=>{panelView={type:'picker'};renderMain();});

let demoEmpty = false;
let stashedTickets = [];
document.getElementById('demoToggle').addEventListener('click', (e)=>{
  demoEmpty = !demoEmpty;
  if(demoEmpty){
    stashedTickets = tickets;
    tickets = [];
    e.target.textContent = 'Preview populated state';
  } else {
    tickets = stashedTickets;
    e.target.textContent = 'Preview empty state';
  }
  activeTicketId = null;
  panelView = {type:'picker'};
  renderSidebar();
  renderMain();
});

renderSidebar();
renderMain();
</script>
</body>
</html>
